name: Observability Release Gate

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to apply observability assets to"
        required: true
        type: choice
        options:
          - dev
          - stage
          - perf
          - prod

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install promtool
        run: |
          sudo apt-get update
          sudo apt-get install -y prometheus
          promtool --version

      - name: Ensure key folders exist
        run: |
          test -d grafana/dashboards
          test -d prometheus/config

      - name: Validate Grafana dashboard JSON
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          files = list(pathlib.Path("grafana/dashboards").glob("*.json"))
          for path in files:
            try:
              json.loads(path.read_text(encoding="utf-8"))
            except Exception as exc:
              print(f"Invalid dashboard JSON: {path} -> {exc}")
              sys.exit(1)

          print(f"Validated {len(files)} dashboard JSON files.")
          PY

      - name: Validate Prometheus config and rules
        run: |
          if [ -f prometheus/config/prometheus.yml ]; then
            promtool check config prometheus/config/prometheus.yml
          fi
          if [ -f prometheus/config/prometheus.loadtest-gateway-odds-betting.yml ]; then
            promtool check config prometheus/config/prometheus.loadtest-gateway-odds-betting.yml
          fi
          shopt -s nullglob
          files=(prometheus/rules/*.yml prometheus/rules/*.yaml)
          if [ ${#files[@]} -gt 0 ]; then
            promtool check rules "${files[@]}"
          fi

  apply:
    needs:
      - validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Grafana dashboards
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          if [ -z "$GRAFANA_URL" ] || [ -z "$GRAFANA_TOKEN" ]; then
            echo "GRAFANA_URL and GRAFANA_TOKEN environment secrets are required."
            exit 1
          fi

          shopt -s nullglob
          files=(grafana/dashboards/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No dashboard files found in grafana/dashboards."
            exit 0
          fi

          for dashboard in "${files[@]}"; do
            echo "Importing $dashboard"
            payload="$(python3 - <<'PY' "$dashboard"
          import json
          import pathlib
          import sys

          dashboard_path = pathlib.Path(sys.argv[1])
          dashboard = json.loads(dashboard_path.read_text(encoding="utf-8"))
          # Grafana rejects imported dashboards with explicit id values.
          dashboard["id"] = None
          print(json.dumps({
              "dashboard": dashboard,
              "overwrite": True
          }))
          PY
            )"

            response_code="$(curl -sS -o /tmp/grafana-import-response.json -w "%{http_code}" \
              -X POST "$GRAFANA_URL/api/dashboards/db" \
              -H "Authorization: Bearer $GRAFANA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload")"

            if [ "$response_code" -lt 200 ] || [ "$response_code" -ge 300 ]; then
              echo "Dashboard import failed for $dashboard (HTTP $response_code)."
              cat /tmp/grafana-import-response.json
              exit 1
            fi
          done

          echo "Successfully imported ${#files[@]} dashboard(s)."
