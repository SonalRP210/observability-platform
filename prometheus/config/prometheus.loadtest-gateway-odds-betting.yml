# Prometheus config for infra/local/docker-compose.loadtest-gateway-odds-betting.stack.yml only.
# Scrapes api-gateway, odds-service, betting-service, redpanda (no other microservices).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'sportsbetting-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'api-gateway'
      - targets: ['betting-service:8084']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'betting-service'
      - targets: ['odds-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'odds-service'

  - job_name: 'redpanda'
    metrics_path: '/public_metrics'
    static_configs:
      - targets: ['redpanda:9644']
        labels:
          application: 'redpanda'
          environment: 'loadtest'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          application: 'prometheus'
