global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Each target gets a stable `service` label for Grafana per-microservice dashboards (see sportsbetting-loadtest-event-platform).
  - job_name: 'sportsbetting-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:18089']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'risk-service'
      - targets: ['api-gateway:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'api-gateway'
      - targets: ['user-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'user-service'
      - targets: ['wallet-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'wallet-service'
      - targets: ['betting-service:8084']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'betting-service'
      - targets: ['odds-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'odds-service'
      - targets: ['event-ingestion-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'event-ingestion-service'
      - targets: ['settlement-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'settlement-service'
      - targets: ['notification-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'notification-service'
      - targets: ['risk-service:8080']
        labels:
          application: 'sportsbetting'
          environment: 'loadtest'
          service: 'risk-service'

  - job_name: 'redpanda'
    metrics_path: '/public_metrics'
    static_configs:
      - targets: ['redpanda:9644']
        labels:
          application: 'redpanda'
          environment: 'loadtest'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          application: 'prometheus'
